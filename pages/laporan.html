<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laporan — Warkop Yamsu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
  :root {
    --navy: #1e214f; --orange: #ff7a00; --bg: #f4f4f7;
    --white: #fff; --text: #1b1b1b; --muted: #aaa; --border: #ececf3;
    --green: #22c55e; --red: #ef4444; --radius: 20px;
  }
  html, body { height: 100%; }
  body {
    display: flex; flex-direction: column; height: 100vh; height: 100dvh;
    max-width: 480px; margin: 0 auto; background: var(--bg);
    color: var(--text); animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* HEADER */
  .header { background: var(--navy); padding: 20px; flex-shrink: 0; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; }
  .header-title { font-size: 26px; font-weight: 700; color: #fff; }
  .header-sub { font-size: 14px; color: rgba(255,255,255,0.8); margin-top: 4px; }

  .header-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; gap: 10px; }
  .btn-reset {
    flex: 1; padding: 10px 16px; background: transparent; color: white;
    border: 1.5px solid rgba(255,255,255,0.3); border-radius: 14px;
    font-size: 13px; font-weight: 600; font-family: 'Poppins', sans-serif;
    cursor: pointer; transition: background 0.2s;
  }
  .btn-reset:hover { background: rgba(255,255,255,0.1); }
  .btn-reset:disabled { opacity: 0.6; cursor: not-allowed; }

  /* SCROLL AREA */
  .scroll-area { flex: 1; overflow-y: auto; padding: 16px; }
  .scroll-area::-webkit-scrollbar { width: 0; }

  /* CARDS */
  .card {
    background: var(--white); border-radius: var(--radius);
    padding: 18px; box-shadow: 0 3px 10px rgba(0,0,0,0.05);
    margin-bottom: 12px;
  }
  .card-label { font-size: 13px; font-weight: 600; color: #666; }
  .card-value { font-size: 26px; font-weight: 700; color: var(--navy); margin-top: 6px; }
  .card-value.pemasukan   { color: var(--green); }
  .card-value.pengeluaran { color: var(--red); }

  .card-bersih {
    background: var(--navy); border-radius: var(--radius);
    padding: 20px; margin-bottom: 12px; text-align: center;
  }
  .card-bersih .card-label { color: rgba(255,255,255,0.75); }
  .card-bersih .card-value { color: var(--orange); font-size: 30px; }
  .card-bersih .card-value.negatif { color: #ff6b6b; }

  .kosong-state { text-align: center; color: var(--muted); font-size: 14px; padding: 30px 20px; }
  .info-note {
    font-size: 12px; color: var(--muted); text-align: center;
    padding: 12px 20px; line-height: 1.5;
  }

  /* FOOTER NAV */
  .footer-nav {
    flex-shrink: 0; width: 100%; background: var(--navy); padding: 14px 0;
    border-top-left-radius: 20px; border-top-right-radius: 20px;
    display: flex; justify-content: space-around; align-items: center;
  }
  .nav-item { color: white; opacity: .7; font-size: 13px; cursor: pointer; text-align: center; }
  .nav-item.active { opacity: 1; color: var(--orange); font-weight: 600; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">Laporan</div>
  <div class="header-sub" id="judul-bulan">Memuat...</div>
  <div class="header-actions">
    <button class="btn-reset" onclick="loadLaporan()">Muat Ulang</button>
  </div>
</div>

<div class="scroll-area" id="isi-laporan">
  <div class="kosong-state">Memuat laporan...</div>
</div>

<div class="footer-nav">
  <div class="nav-item" data-page="transaksi"><p>Transaksi</p></div>
  <div class="nav-item" data-page="riwayat"><p>Riwayat</p></div>
  <div class="nav-item" data-page="pengeluaran"><p>Pengeluaran</p></div>
  <div class="nav-item active" data-page="laporan"><p>Laporan</p></div>
</div>

<script src="../function/utils.js"></script>
<script>authGuard();</script>
<script>

// Angka ini LANGSUNG dibaca dari cell yang sudah dihitung Spreadsheet
// (bukan dihitung ulang di sini), jadi selalu sama persis dengan yang
// ditampilkan di Sheet.
function loadLaporan() {
  const btn = document.querySelector('.btn-reset');
  if (btn) { btn.disabled = true; btn.textContent = 'Memuat...'; }

  fetch(`${SHEET_URL}?action=getLaporanBulanan`)
    .then(res => res.json())
    .then(data => {
      if (btn) { btn.disabled = false; btn.textContent = 'Muat Ulang'; }

      if (data.status !== 'ok') {
        document.getElementById('isi-laporan').innerHTML =
          `<div class="kosong-state">Gagal memuat laporan: ${data.message || 'Unknown error'}</div>`;
        return;
      }

      document.getElementById('judul-bulan').textContent = data.judulBulan;

      const bersih = data.pendapatanBersih;
      document.getElementById('isi-laporan').innerHTML = `
        <div class="card-bersih">
          <div class="card-label">Pendapatan Bersih</div>
          <div class="card-value ${bersih < 0 ? 'negatif' : ''}">${fmt(bersih)}</div>
        </div>
        <div class="card">
          <div class="card-label">Pemasukan</div>
          <div class="card-value pemasukan">${fmt(data.pemasukan)}</div>
        </div>
        <div class="card">
          <div class="card-label">Pengeluaran</div>
          <div class="card-value pengeluaran">${fmt(data.pengeluaran)}</div>
        </div>
        <div class="info-note">
          Angka di atas diambil langsung dari Spreadsheet dan otomatis
          bersih lagi tiap bulan berikutnya (lewat menu "Tutup Buku").
        </div>
      `;
    })
    .catch(() => {
      if (btn) { btn.disabled = false; btn.textContent = 'Muat Ulang'; }
      document.getElementById('isi-laporan').innerHTML =
        '<div class="kosong-state">Gagal konek ke server. Coba muat ulang.</div>';
    });
}

loadLaporan();
</script>

<script src="../function/Navigation.js"></script>
</body>
</html>
