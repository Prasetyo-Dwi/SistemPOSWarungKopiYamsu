<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riwayat — Warkop Yamsu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="riwayat.css">
</head>
<body>

<div class="phone">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-title">Riwayat</div>
        <div class="header-sub">Transaksi hari ini</div>
      </div>
      <div class="header-date">
        <div class="header-date-label" id="tgl-el">—</div>
        <div class="header-date-val" id="total-transaksi">0 transaksi</div>
      </div>
    </div>

    <!-- Baris pemasukan -->
    <div class="header-pemasukan">
      <span>Pemasukan hari ini</span>
      <span id="pemasukan-hari-ini">Rp 0</span>
    </div>

    <!-- ACTIONS -->
    <div class="header-actions">
      <button class="btn-reset" onclick="loadRiwayat()">Muat Ulang Daftar</button>
      <div class="storage-info" id="storage-info">Menghitung...</div>
    </div>

  </div>

  <!-- SCROLL AREA -->
  <div class="scroll-area">

    <!-- LIST -->
    <div class="riwayat-list" id="riwayat-list">
      <div class="kosong-state">Belum ada transaksi hari ini</div>
    </div>

  </div>

  <!-- FOOTER NAV -->
  <div class="footer-nav">
    <a class="btn-sheet" href="https://docs.google.com/spreadsheets/d/1xGUtsabt7FjGN5v0jy7COz3-5SBFz0vzBFlHwmMZsLM/edit" target="_blank">
        Buka Spreadsheet
    </a>
    <div class="nav-item" data-page="transaksi"><p>Transaksi</p></div>
    <div class="nav-item active" data-page="riwayat"><p>Riwayat</p></div>
    <div class="nav-item" data-page="pengeluaran"><p>Pengeluaran</p></div>
  </div>

</div>

<script src="../function/utils.js"></script>
<script>authGuard();</script>

<script>

// ===== STATE GLOBAL =====
let riwayatGlobal    = [];
let editIndex        = -1;
let itemsSebelumEdit = [];

// ===== CLOCK =====
function tick() {
  const now = new Date();
  document.getElementById('tgl-el').textContent = now.toLocaleDateString('id-ID', {
    weekday: 'short', day: 'numeric', month: 'long', year: 'numeric'
  });
}
tick();

// ===== HITUNG STORAGE =====
function hitungStorage() {
  let total = 0;
  for (let key in localStorage) {
    if (localStorage.hasOwnProperty(key)) {
      total += (localStorage[key].length + key.length) * 2;
    }
  }
  const usedKB = total / 1024;
  const max    = 5120;
  const persen = ((usedKB / max) * 100).toFixed(1);
  const usedText = usedKB < 1024
    ? usedKB.toFixed(1) + ' KB'
    : (usedKB / 1024).toFixed(2) + ' MB';

  const el = document.getElementById('storage-info');
  el.textContent = usedText + ' / 5 MB (' + persen + '%)';
  el.classList.remove('safe', 'warn', 'danger');
  if      (persen >= 80) el.classList.add('danger');
  else if (persen >= 60) el.classList.add('warn');
  else                   el.classList.add('safe');
}

// ===== LOAD RIWAYAT DARI SHEETS =====
function loadRiwayat() {
  fetch(`${SHEET_URL}?action=getRiwayat`)
    .then(res => res.json())
    .then(data => {
      if (data.status === 'ok' && data.riwayat) {
        renderRiwayatList(data.riwayat);
      }
    })
    .catch(() => {
      const riwayat = JSON.parse(localStorage.getItem('riwayat') || '[]');
      renderRiwayatList(riwayat);
    });
}

// ===== RENDER RIWAYAT LIST =====
function renderRiwayatList(riwayat) {
  riwayatGlobal = riwayat;
  localStorage.setItem('riwayat', JSON.stringify(riwayat));

  const list = document.getElementById('riwayat-list');
  document.getElementById('total-transaksi').textContent = riwayat.length + ' transaksi';
  hitungStorage();
  document.getElementById('pemasukan-hari-ini').textContent = fmt(hitungPemasukanHariIni());

  if (riwayat.length === 0) {
    list.innerHTML = '<div class="kosong-state">Belum ada transaksi</div>';
    return;
  }

  list.innerHTML = riwayat.map((r, i) => `
    <div class="riwayat-card" id="card-${i}">
      <div class="card-header" onclick="toggleCard(this)">
        <div class="card-header-left">
          <div class="card-icon">
            <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2"/></svg>
          </div>
          <div class="card-info">
            <div class="card-title">Transaksi #${String(r.nomor).padStart(3, '0')}</div>
            <div class="card-meta">${r.tanggal} · ${r.items.length} item</div>
          </div>
        </div>
        <div class="card-header-right">
          <span class="badge-status ${r.status === 'lunas' || r.status === 'tersimpan' ? 'badge-lunas' : 'badge-belum'}">
            ${r.status === 'lunas' || r.status === 'tersimpan' ? 'Sudah dibayar' : 'Belum dibayar'}
          </span>
          <div class="toggle-btn">
            <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>
      </div>
      <div class="card-body" style="max-height:0; overflow:hidden; transition: max-height 0.4s ease;">
        <div class="card-body-inner">
          <div class="item-list">
            ${r.items.map(item => `
              <div class="item-row">
                <span>- ${item.produk}</span>
                <span>${item.jumlah}x ${fmt(item.harga)}</span>
              </div>
            `).join('')}
          </div>
          <hr class="divider">
          <div class="card-footer">
            <div>
              <div class="total-label">TOTAL</div>
              <div class="total-val">${fmt(r.total)}</div>
            </div>
            ${r.status === 'lunas' || r.status === 'tersimpan'
              ? '<div class="btn-lunas">✓ Sudah dibayar</div>'
              : `<div style="display:flex;gap:8px;">
                  <button class="btn-hapus-trx" onclick="hapusTransaksi('${r.nomor}', '${r.tanggal}', this)">Hapus</button>
                  <button class="btn-edit-trx"  onclick="bukaEdit(${i})">Edit</button>
                  <button class="btn-bayar"      onclick="ubahStatusTransaksi('${r.nomor}', 'lunas', ${i})">Bayar</button>
                </div>`
            }
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

// ===== TOGGLE CARD =====
function toggleCard(header) {
  const card = header.closest('.riwayat-card');
  const body = card.querySelector('.card-body');

  if (card.classList.contains('open')) {
    body.style.maxHeight = body.scrollHeight + 'px';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => { body.style.maxHeight = '0'; });
    });
    card.classList.remove('open');
  } else {
    card.classList.add('open');
    body.style.maxHeight = body.scrollHeight + 'px';
    body.addEventListener('transitionend', () => {
      body.style.maxHeight = 'none';
    }, { once: true });
  }
}

// ===== UBAH STATUS TRANSAKSI =====
function ubahStatusTransaksi(nomor, statusBaru, index) {
  const btn = document.querySelector(`#card-${index} .btn-bayar`);
  if (btn) { btn.textContent = 'Memproses...'; btn.disabled = true; }

  const params = new URLSearchParams({
    action: 'updateStatusTransaksi',
    nomor:  nomor,
    status: statusBaru
  });

  fetch(`${SHEET_URL}?${params}`, { mode: 'no-cors' })
    .then(() => {
      if (riwayatGlobal[index]) {
        tambahPemasukan(riwayatGlobal[index].total);
        riwayatGlobal[index].status = 'tersimpan';
        localStorage.setItem('riwayat', JSON.stringify(riwayatGlobal));
      }
      loadRiwayat();
    })
    .catch(() => {
      if (btn) { btn.textContent = 'Bayar'; btn.disabled = false; }
      alert('Gagal update status!');
    });
}

// ===== HELPER PRODUK (untuk picker) =====
function getProdukList() {
  return JSON.parse(localStorage.getItem('produk_list') || '[]');
}

// ===== BUKA EDIT =====
function bukaEdit(index) {
  const r = riwayatGlobal[index];
  if (!r) {
    alert('Data transaksi tidak ditemukan.');
    return;
  }

  editIndex        = index;
  itemsSebelumEdit = r.items.map(x => ({ ...x }));

  renderModalEdit(r.items);
  document.getElementById('modal-edit-overlay').classList.add('active');
}

// ===== RENDER MODAL EDIT =====
function renderModalEdit(items) {
  document.getElementById('modal-edit-body').innerHTML = `
    <div id="edit-items">
      ${items.map((item, i) => `
        <div class="edit-item-row" id="edit-row-${i}" data-nama="${item.produk}" data-harga="${item.harga}">
          <div class="edit-item-info">
            <span class="edit-item-nama">${item.produk}</span>
            <span class="edit-item-harga">${fmt(item.harga)}</span>
          </div>
          <div class="edit-qty-control">
            <button onclick="editQty(${i}, -1)">−</button>
            <span id="edit-qty-${i}">${item.jumlah}</span>
            <button onclick="editQty(${i}, 1)">+</button>
            <button class="btn-hapus-row" onclick="hapusItemEdit(${i})">🗑️</button>
          </div>
        </div>
      `).join('')}
    </div>
    <button class="btn-tambah-item" onclick="bukaPilihProduk()">+ Tambah Produk</button>
  `;
}

// ===== EDIT QTY =====
function editQty(i, delta) {
  const span = document.getElementById(`edit-qty-${i}`);
  const cur  = parseInt(span.textContent) || 1;
  span.textContent = Math.max(1, cur + delta);
}

// ===== HAPUS ITEM DI MODAL EDIT =====
// FIX: pakai fungsi reindexEditRows() setelah hapus agar tidak rawan bug
function hapusItemEdit(i) {
  const row = document.getElementById(`edit-row-${i}`);
  if (row) row.remove();
  reindexEditRows();
}

function reindexEditRows() {
  document.querySelectorAll('#edit-items .edit-item-row').forEach((el, idx) => {
    el.id = `edit-row-${idx}`;
    const qtySpan = el.querySelector('[id^="edit-qty-"]');
    if (qtySpan) qtySpan.id = `edit-qty-${idx}`;
    const btns = el.querySelectorAll('.edit-qty-control button');
    if (btns[0]) btns[0].setAttribute('onclick', `editQty(${idx}, -1)`);
    if (btns[1]) btns[1].setAttribute('onclick', `editQty(${idx}, 1)`);
    if (btns[2]) btns[2].setAttribute('onclick', `hapusItemEdit(${idx})`);
  });
}

// ===== SIMPAN EDIT =====
// FIX: hapus ubahStokProduk() & syncStokKeSheet() — stok di-handle sepenuhnya oleh Apps Script
async function simpanEdit() {
  if (editIndex === -1) return;

  const rows      = document.querySelectorAll('#edit-items .edit-item-row');
  const itemsBaru = [];
  rows.forEach(row => {
    const produk = row.dataset.nama;
    const harga  = parseInt(row.dataset.harga) || 0;
    const jumlah = parseInt(row.querySelector('[id^="edit-qty-"]').textContent) || 1;
    if (produk) itemsBaru.push({ produk, jumlah, harga });
  });

  if (itemsBaru.length === 0) { alert('Minimal ada 1 item!'); return; }

  const r = riwayatGlobal[editIndex];
  if (!r) { alert('Data transaksi tidak ditemukan.'); return; }

  const btnSimpan = document.querySelector('.btn-modal-save');
  if (btnSimpan) { btnSimpan.textContent = 'Menyimpan...'; btnSimpan.disabled = true; }

  try {
    const params = new URLSearchParams({
      action:    'editTransaksi',
      nomor:     r.nomor,
      tanggal:   r.tanggal,
      items:     JSON.stringify(itemsBaru),
      itemsLama: JSON.stringify(itemsSebelumEdit)
    });

    const res  = await fetch(`${SHEET_URL}?${params}`);
    const data = await res.json();

    if (data.status !== 'ok') {
      alert('Gagal simpan: ' + (data.message || 'Unknown error'));
      if (btnSimpan) { btnSimpan.textContent = 'Simpan'; btnSimpan.disabled = false; }
      return;
    }

    // Update state global & localStorage (stok sudah di-handle Apps Script)
    const total = itemsBaru.reduce((s, x) => s + x.jumlah * x.harga, 0);
    riwayatGlobal[editIndex].items = itemsBaru;
    riwayatGlobal[editIndex].total = total;
    localStorage.setItem('riwayat', JSON.stringify(riwayatGlobal));

    tutupModalEdit();
    loadRiwayat();

  } catch (err) {
    alert('Error: ' + err.message);
    if (btnSimpan) { btnSimpan.textContent = 'Simpan'; btnSimpan.disabled = false; }
  }
}

// ===== TUTUP MODAL EDIT =====
function tutupModalEdit() {
  document.getElementById('modal-edit-overlay').classList.remove('active');
  editIndex        = -1;
  itemsSebelumEdit = [];
  // Reset tombol simpan supaya tidak kelock saat modal dibuka lagi
  const btnSimpan = document.querySelector('.btn-modal-save');
  if (btnSimpan) { btnSimpan.textContent = 'Simpan'; btnSimpan.disabled = false; }
}

// ===== BUKA PILIH PRODUK =====
function bukaPilihProduk() {
  const produkList = getProdukList();
  const grid = document.getElementById('produk-picker-grid');
  grid.innerHTML = produkList.map((p, i) => `
    <div class="picker-item ${p.stok <= 0 ? 'picker-habis' : ''}" onclick="${p.stok > 0 ? `pilihProduk(${i})` : ''}">
      <div class="picker-emoji">${p.emoji}</div>
      <div class="picker-nama">${p.nama}</div>
      <div class="picker-harga">${fmt(p.harga)}</div>
      <div class="picker-stok ${p.stok <= 5 ? 'stok-tipis' : ''}">Stok: ${p.stok}</div>
    </div>
  `).join('');
  document.getElementById('modal-picker-overlay').classList.add('active');
}

// ===== PILIH PRODUK DARI PICKER =====
function pilihProduk(idx) {
  const produkList = getProdukList();
  const p = produkList[idx];
  if (!p) return;

  const rows  = document.querySelectorAll('#edit-items .edit-item-row');
  let found   = false;
  rows.forEach(row => {
    if (row.dataset.nama.toLowerCase() === p.nama.toLowerCase()) {
      const qtyEl = row.querySelector('[id^="edit-qty-"]');
      qtyEl.textContent = parseInt(qtyEl.textContent) + 1;
      found = true;
    }
  });

  if (!found) {
    const container = document.getElementById('edit-items');
    const newIdx    = container.querySelectorAll('.edit-item-row').length;
    const div       = document.createElement('div');
    div.className   = 'edit-item-row';
    div.id          = `edit-row-${newIdx}`;
    div.dataset.nama  = p.nama;
    div.dataset.harga = p.harga;
    div.innerHTML = `
      <div class="edit-item-info">
        <span class="edit-item-nama">${p.nama}</span>
        <span class="edit-item-harga">${fmt(p.harga)}</span>
      </div>
      <div class="edit-qty-control">
        <button onclick="editQty(${newIdx}, -1)">−</button>
        <span id="edit-qty-${newIdx}">1</span>
        <button onclick="editQty(${newIdx}, 1)">+</button>
        <button class="btn-hapus-row" onclick="hapusItemEdit(${newIdx})">🗑️</button>
      </div>
    `;
    container.appendChild(div);
  }

  tutupPicker();
}

// ===== HAPUS TRANSAKSI =====
// FIX: kirim tanggal ke Apps Script agar filter nomor + tanggal (bukan nomor doang)
async function hapusTransaksi(nomor, tanggal, btn) {
  if (!confirm(`Hapus Transaksi #${String(nomor).padStart(3, '0')}?`)) return;
  if (btn) { btn.textContent = 'Menghapus...'; btn.disabled = true; }

  try {
    const res  = await fetch(`${SHEET_URL}?action=hapusTransaksi&nomor=${nomor}&tanggal=${encodeURIComponent(tanggal)}`);
    const data = await res.json();

    if (data.status === 'ok') {
      loadRiwayat();
    } else {
      alert('Gagal hapus: ' + data.message);
      if (btn) { btn.textContent = 'Hapus'; btn.disabled = false; }
    }
  } catch (err) {
    alert('Error: ' + err.message);
    if (btn) { btn.textContent = 'Hapus'; btn.disabled = false; }
  }
}

// ===== TUTUP PICKER =====
function tutupPicker() {
  document.getElementById('modal-picker-overlay').classList.remove('active');
}

// ===== INIT =====
loadRiwayat();

</script>

<!-- MODAL EDIT TRANSAKSI -->
<div class="modal-overlay" id="modal-edit-overlay" onclick="tutupModalEdit()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title">Edit Transaksi</div>
      <button class="modal-close" onclick="tutupModalEdit()">×</button>
    </div>
    <div class="modal-body" id="modal-edit-body"></div>
    <div class="modal-footer">
      <button class="btn-modal-cancel" onclick="tutupModalEdit()">Batal</button>
      <button class="btn-modal-save"   onclick="simpanEdit()">Simpan</button>
    </div>
  </div>
</div>

<!-- MODAL PILIH PRODUK -->
<div class="modal-overlay" id="modal-picker-overlay" onclick="tutupPicker()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title">Pilih Produk</div>
      <button class="modal-close" onclick="tutupPicker()">×</button>
    </div>
    <div class="modal-body">
      <div class="produk-picker-grid" id="produk-picker-grid"></div>
    </div>
  </div>
</div>

<script src="../function/Navigation.js"></script>
</body>
</html>
